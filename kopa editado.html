<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOPA CUENCA | Torneo de Fútbol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;700&display=swap');
        
        :root {
            --primary: #d4ff00; /* Amarillo Kopa */
            --dark: #0a0a0a;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark);
            color: white;
        }

        .font-bebas { font-family: 'Bebas Neue', cursive; }
        
        .kopa-card {
            background: #1a1a1a;
            border-left: 4px solid var(--primary);
            transition: transform 0.3s;
        }

        .kopa-card:hover {
            transform: scale(1.02);
            cursor: pointer;
        }

        /* Ventana Emergente (Modal) */
        #modalJugadores {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <nav class="p-6 flex justify-between items-center border-b border-gray-800">
        <h1 class="text-3xl font-bebas text-[#d4ff00]">KOPA <span class="text-white">CUENCA</span></h1>
        <div class="space-x-6 hidden md:block">
            <a href="#inicio" class="hover:text-[#d4ff00]">Inicio</a>
            <a href="#equipos" class="hover:text-[#d4ff00]">Equipos</a>
            <a href="#tabla" class="hover:text-[#d4ff00]">Tabla</a>
        </div>
    </nav>

    <section id="inicio" class="p-8">
        <h2 class="text-5xl font-bebas mb-6 text-center">EL TORNEO QUE TUS PANAS ESTABAN ESPERANDO</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-6xl mx-auto">
            <div class="h-64 bg-gray-800 rounded-lg overflow-hidden">
                <img src="[COLOCAR_URL_DE_FOTO_PRINCIPAL_1_AQUÍ]" alt="Evento" class="w-full h-full object-cover">
            </div>
            <div class="h-64 bg-gray-800 rounded-lg overflow-hidden">
                <img src="[COLOCAR_URL_DE_FOTO_PRINCIPAL_2_AQUÍ]" alt="Cancha" class="w-full h-full object-cover">
            </div>
        </div>
    </section>

    <section id="equipos" class="p-8 max-w-6xl mx-auto">
        <h3 class="text-3xl font-bebas mb-6 border-b border-[#d4ff00] inline-block">Nuestros Equipos</h3>
        <p class="text-gray-400 mb-4">(Haz clic en un equipo para ver sus jugadores)</p>
        <div id="lista-equipos" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            </div>
    </section>

    <section id="tabla" class="p-8 max-w-6xl mx-auto">
        <h3 class="text-3xl font-bebas mb-6">Tabla de Posiciones</h3>
        <div class="overflow-x-auto bg-[#1a1a1a] rounded-lg">
            <table class="w-full text-left">
                <thead class="bg-[#d4ff00] text-black font-bold">
                    <tr>
                        <th class="p-4">Equipo</th>
                        <th class="p-4">PJ</th>
                        <th class="p-4">PTS</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-tabla">
                    </tbody>
            </table>
        </div>
    </section>

    <div id="modalJugadores" onclick="cerrarModal()">
        <div class="bg-[#1a1a1a] p-8 rounded-xl max-w-md w-full border border-[#d4ff00]" onclick="event.stopPropagation()">
            <h2 id="modalNombreEquipo" class="text-4xl font-bebas text-[#d4ff00] mb-4"></h2>
            <h4 class="text-xl mb-2 underline">Lista de Participantes:</h4>
            <ul id="modalListaJugadores" class="text-gray-300 space-y-2">
                </ul>
            <button onclick="cerrarModal()" class="mt-6 bg-[#d4ff00] text-black px-6 py-2 rounded-full font-bold">CERRAR</button>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURA TUS EQUIPOS AQUÍ ABAJO
        // ==========================================
        const equipos = [
            {
                id: 1,
                nombre: "PANTERA",
                logo: "https://i.postimg.cc/hGH4DwRr/Whats-App-Image-2026-04-06-at-17-53-31.jpg",
                puntos: 0,
                pj: 0,
                jugadores: ["Esteban Mogrovejo", "Mateo Galarza", " esteban enderica "]
            },
            {
                id: 2,
                nombre: "PERRROS",
                logo: "[URL_IMAGEN_LOGO_2]",
                puntos: 0,
                pj: 0,
                jugadores: ["Diego narvaez", "Andres Ordoñes", "Pedro Chavez"]
            },
            // Puedes copiar y pegar el bloque de arriba para agregar más equipos
        ];

        // Función para mostrar equipos en la web
        function cargarEquipos() {
            const contenedor = document.getElementById('lista-equipos');
            const tabla = document.getElementById('cuerpo-tabla');
            
            equipos.forEach(equipo => {
                // Crear Card de equipo
                contenedor.innerHTML += `
                    <div class="kopa-card p-6 rounded-lg flex items-center space-x-4" onclick="verJugadores(${equipo.id})">
                        <img src="${equipo.logo}" class="w-16 h-16 rounded-full bg-black object-contain" alt="Logo">
                        <h4 class="text-xl font-bold">${equipo.nombre}</h4>
                    </div>
                `;

                // Crear fila en la tabla
                tabla.innerHTML += `
                    <tr class="border-b border-gray-800">
                        <td class="p-4 flex items-center"><img src="${equipo.logo}" class="w-8 h-8 mr-2">${equipo.nombre}</td>
                        <td class="p-4">${equipo.pj}</td>
                        <td class="p-4 font-bold text-[#d4ff00]">${equipo.puntos}</td>
                    </tr>
                `;
            });
        }

        // Función para abrir la ventana de jugadores
        function verJugadores(id) {
            const equipo = equipos.find(e => e.id === id);
            document.getElementById('modalNombreEquipo').innerText = equipo.nombre;
            const lista = document.getElementById('modalListaJugadores');
            lista.innerHTML = ""; // Limpiar lista anterior
            
            equipo.jugadores.forEach(j => {
                lista.innerHTML += `<li><i class="fa-solid fa-user-check text-[#d4ff00] mr-2"></i> ${j}</li>`;
            });

            document.getElementById('modalJugadores').style.display = 'flex';
        }

        function cerrarModal() {
            document.getElementById('modalJugadores').style.display = 'none';
        }

        // Iniciar la página
        cargarEquipos();

    </script>
</body>
</html>
